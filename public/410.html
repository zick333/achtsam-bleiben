<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>410 - Seite entfernt - Achtsam Bleiben</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(to bottom, #f0fdf4, #ffffff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    h1 {
      font-size: 4rem;
      color: #166534;
      margin-bottom: 1rem;
    }
    h2 {
      font-size: 1.5rem;
      color: #374151;
      margin-bottom: 1rem;
    }
    p {
      color: #6b7280;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    a {
      display: inline-block;
      background: #166534;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    a:hover {
      background: #15803d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>410</h1>
    <h2>Diese Seite existiert nicht mehr</h2>
    <p>
      Die angeforderte Seite wurde dauerhaft entfernt.
      Unsere Website wurde neu gestaltet und diese URL ist nicht mehr verfügbar.
    </p>
    <a href="/">Zur Startseite</a>
  </div>
</body>
</html>
